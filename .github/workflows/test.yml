name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run the test suite (offline — LLM/external paths are stubbed)
        run: uv run --extra vision --extra graph pytest -q

      - name: Lint
        run: uvx ruff check .
